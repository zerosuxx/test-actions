name: Build nix-on-droid APKs

on:
  workflow_dispatch:

jobs:
  build-termuxam:
    name: Build TermuxAm APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: termux/TermuxAm
          ref: master

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch package name
        run: |
          sed -i 's/applicationId "com.termux.termuxam"/applicationId "com.termux.nix.am"/' app/build.gradle
          find . \( -name "*.xml" -o -name "*.java" -o -name "*.kt" \) | \
            xargs grep -l "com\.termux\.termuxam" | \
            xargs sed -i 's/com\.termux\.termuxam/com.termux.nix.am/g'
          grep "applicationId" app/build.gradle

      - name: Build
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/*.apk app/build/outputs/apk/debug/termuxam-nix-on-droid.apk

      - uses: actions/upload-artifact@v4
        with:
          name: termuxam-nix-on-droid
          path: app/build/outputs/apk/debug/termuxam-nix-on-droid.apk

  build-termux-api:
    name: Build Termux:API APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: termux/termux-api
          ref: master

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch TERMUX_PACKAGE_NAME
        run: |
          sed -i 's/manifestPlaceholders\.TERMUX_PACKAGE_NAME = "com\.termux"/manifestPlaceholders.TERMUX_PACKAGE_NAME = "com.termux.nix"/' \
            app/build.gradle
          grep "TERMUX_PACKAGE_NAME" app/build.gradle

      - name: Build
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/*.apk app/build/outputs/apk/debug/termux-api-nix-on-droid.apk

      - uses: actions/upload-artifact@v4
        with:
          name: termux-api-nix-on-droid
          path: app/build/outputs/apk/debug/termux-api-nix-on-droid.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-termuxam, build-termux-api]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: termuxam-nix-on-droid
          path: apks/

      - uses: actions/download-artifact@v4
        with:
          name: termux-api-nix-on-droid
          path: apks/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "nix-on-droid APKs $TAG" \
            --notes $'Patched builds for nix-on-droid (`com.termux.nix`).\n\n**Install order:**\n1. termuxam-nix-on-droid.apk\n2. termux-api-nix-on-droid.apk' \
            apks/termuxam-nix-on-droid.apk \
            apks/termux-api-nix-on-droid.apk      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/*.apk \
             app/build/outputs/apk/debug/termuxam-nix-on-droid.apk

      - name: Upload TermuxAm artifact
        uses: actions/upload-artifact@v4
        with:
          name: termuxam-nix-on-droid
          path: app/build/outputs/apk/debug/termuxam-nix-on-droid.apk

  build-termux-api:
    name: Build Termux:API APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout termux-api
        uses: actions/checkout@v4
        with:
          repository: termux/termux-api
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Patch TERMUX_PACKAGE_NAME to com.termux.nix
        run: |
          sed -i 's/manifestPlaceholders\.TERMUX_PACKAGE_NAME = "com\.termux"/manifestPlaceholders.TERMUX_PACKAGE_NAME = "com.termux.nix"/' \
            app/build.gradle
          grep "TERMUX_PACKAGE_NAME" app/build.gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/*.apk \
             app/build/outputs/apk/debug/termux-api-nix-on-droid.apk

      - name: Upload Termux:API artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-api-nix-on-droid
          path: app/build/outputs/apk/debug/termux-api-nix-on-droid.apk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-termuxam, build-termux-api]
    # tag push esetén fut csak, workflow_dispatch-nél nem
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download TermuxAm APK
        uses: actions/download-artifact@v4
        with:
          name: termuxam-nix-on-droid
          path: apks/

      - name: Download Termux:API APK
        uses: actions/download-artifact@v4
        with:
          name: termux-api-nix-on-droid
          path: apks/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "nix-on-droid APKs ${{ github.ref_name }}"
          body: |
            ## nix-on-droid compatible APKs

            Patched builds of TermuxAm and Termux:API for use with nix-on-droid (`com.termux.nix`).

            ### Changes
            - **TermuxAm**: `applicationId` → `com.termux.nix.am`
            - **Termux:API**: `TERMUX_PACKAGE_NAME` → `com.termux.nix`

            ### Install order
            1. `termuxam-nix-on-droid.apk`
            2. `termux-api-nix-on-droid.apk`
          files: |
            apks/termuxam-nix-on-droid.apk
            apks/termux-api-nix-on-droid.apk
          draft: false
          prerelease: false
